name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to cPanel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl, zip, gd, exif, bcmath, fileinfo, intl, pdo_pgsql, pgsql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: alwaab-erp/package-lock.json

      - name: Install Composer deps & build frontend
        working-directory: alwaab-erp
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            WEBSITE_PUBLIC_HTML="${{ secrets.WEBSITE_PUBLIC_HTML }}"
            export DEPLOY_PATH WEBSITE_PUBLIC_HTML
            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main
            bash deploy/cpanel/deploy.sh

      - name: Upload built assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: alwaab-erp/public/build/*
          target: ${{ secrets.DEPLOY_PATH }}/alwaab-erp/public/build/
          strip_components: 3
