services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alwaab-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - alwaab
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: alwaab-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - alwaab
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: alwaab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alwaab
      POSTGRES_USER: alwaab
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alwaab

  redis:
    image: redis:7-alpine
    container_name: alwaab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - alwaab

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alwaab-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=2 --timeout=900
    volumes:
      - .:/var/www
    networks:
      - alwaab
    depends_on:
      - app
      - redis

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alwaab-reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    volumes:
      - .:/var/www
    ports:
      - "8081:8081"
    networks:
      - alwaab
    depends_on:
      - app
      - redis

networks:
  alwaab:
    driver: bridge

volumes:
  postgres_data:
